<!DOCTYPE html>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; font-size: 13px; max-width: 390px; margin: 0 auto; }
.header { background: #161b22; border-bottom: 1px solid #21262d; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 13px; color: #58a6ff; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
.header .date { font-size: 11px; color: #6e7681; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #21262d; border-bottom: 1px solid #21262d; }
.stat { background: #0d1117; padding: 10px 14px; }
.stat-label { font-size: 10px; color: #6e7681; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 3px; }
.stat-value { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
.stat-value.pos { color: #3fb950; }
.stat-value.neg { color: #f85149; }
.stat-value.neutral { color: #c9d1d9; }
.stat-value.blue { color: #58a6ff; }
.form-section { background: #161b22; border-bottom: 1px solid #21262d; padding: 12px 14px; }
.form-title { font-size: 10px; color: #6e7681; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.form-row.three { grid-template-columns: 2fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 3px; }
.form-group label { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.6px; }
.form-group input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 8px; font-family: 'Courier New', monospace; font-size: 12px; border-radius: 4px; width: 100%; outline: none; }
.form-group input:focus { border-color: #58a6ff; }
.toggle-row { display: flex; gap: 8px; margin-bottom: 8px; }
.dir-btn { flex: 1; padding: 6px; border: 1px solid #30363d; background: #0d1117; color: #6e7681; font-family: 'Courier New', monospace; font-size: 12px; border-radius: 4px; cursor: pointer; letter-spacing: 1px; text-align: center; }
.dir-btn.active-long { background: #0d2218; border-color: #3fb950; color: #3fb950; }
.dir-btn.active-short { background: #2d0e0e; border-color: #f85149; color: #f85149; }
.add-btn { width: 100%; padding: 8px; background: #1f3a5f; border: 1px solid #58a6ff; color: #58a6ff; font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 1px; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 4px; }
.add-btn:hover { background: #2d4f7c; }
.log-section { padding: 0 0 60px; }
.log-header { display: grid; grid-template-columns: 2fr 0.7fr 0.5fr 0.8fr 0.8fr 0.8fr; gap: 4px; padding: 6px 14px; background: #161b22; border-bottom: 1px solid #21262d; }
.log-header span { font-size: 9px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.6px; }
.log-header span:not(:first-child) { text-align: right; }
.trade-row { display: grid; grid-template-columns: 2fr 0.7fr 0.5fr 0.8fr 0.8fr 0.8fr; gap: 4px; padding: 7px 14px; border-bottom: 1px solid #161b22; align-items: center; cursor: pointer; }
.trade-row:hover { background: #161b22; }
.trade-row.win { border-left: 2px solid #3fb950; }
.trade-row.loss { border-left: 2px solid #f85149; }
.trade-ticker { font-size: 12px; font-weight: 700; color: #c9d1d9; }
.trade-dir { font-size: 10px; }
.trade-dir.long { color: #3fb950; }
.trade-dir.short { color: #f85149; }
.trade-val { font-size: 11px; text-align: right; }
.trade-val.pos { color: #3fb950; }
.trade-val.neg { color: #f85149; }
.trade-val.muted { color: #6e7681; }
.trade-contracts { font-size: 11px; color: #8b949e; text-align: right; }
.empty-state { padding: 30px 14px; text-align: center; color: #6e7681; font-size: 12px; }
.footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: #0d1117; border-top: 1px solid #21262d; padding: 8px 14px; display: flex; gap: 8px; }
.reset-btn { flex: 1; padding: 8px; background: #2d0e0e; border: 1px solid #f85149; color: #f85149; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 1px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
.reset-btn:hover { background: #3d1515; }
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
.confirm-overlay.show { display: flex; }
.confirm-box { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; width: 280px; text-align: center; }
.confirm-box p { color: #c9d1d9; font-size: 13px; margin-bottom: 16px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns button { flex: 1; padding: 8px; font-family: 'Courier New', monospace; font-size: 12px; border-radius: 4px; cursor: pointer; border: 1px solid; text-transform: uppercase; letter-spacing: 1px; }
.confirm-yes { background: #2d0e0e; border-color: #f85149 !important; color: #f85149; }
.confirm-no { background: #1f3a5f; border-color: #58a6ff !important; color: #58a6ff; }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Day trading tracker — log trades and view daily P&L summary</h2>

<div class="header">
  <h1>⬛ Trade Log</h1>
  <span class="date" id="todayDate"></span>
</div>

<div class="stats-grid">
  <div class="stat">
    <div class="stat-label">W / L</div>
    <div class="stat-value neutral" id="wl">0 / 0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Win Rate</div>
    <div class="stat-value neutral" id="winrate">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Gross P&L</div>
    <div class="stat-value neutral" id="grossPL">0.00</div>
  </div>
  <div class="stat">
    <div class="stat-label">Net P&L</div>
    <div class="stat-value neutral" id="netPL">0.00</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total Fees</div>
    <div class="stat-value blue" id="totalFees">0.00</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total Commissions</div>
    <div class="stat-value blue" id="totalComm">0.00</div>
  </div>
</div>

<div class="form-section">
  <div class="form-title">+ New Trade</div>
  <div class="form-row three">
    <div class="form-group">
      <label>Instrument</label>
      <input id="ticker" placeholder="ES, NQ, CL…" />
    </div>
    <div class="form-group">
      <label>Contracts</label>
      <input id="contracts" type="number" placeholder="1" min="1" />
    </div>
    <div class="form-group">
      <label>Direction</label>
      <div class="toggle-row" style="gap:4px; margin:0;">
        <div class="dir-btn active-long" id="btnLong" onclick="setDir('LONG')">L</div>
        <div class="dir-btn" id="btnShort" onclick="setDir('SHORT')">S</div>
      </div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Gross P&L</label>
      <input id="pnl" type="number" placeholder="e.g. 250.00" step="0.01" />
    </div>
    <div class="form-group">
      <label>Fees</label>
      <input id="fees" type="number" placeholder="e.g. 4.20" step="0.01" min="0" />
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Commission</label>
      <input id="comm" type="number" placeholder="e.g. 2.10" step="0.01" min="0" />
    </div>
    <div class="form-group" style="justify-content:flex-end;">
    </div>
  </div>
  <button class="add-btn" onclick="addTrade()">Add Trade</button>
</div>

<div class="log-section">
  <div class="log-header">
    <span>Instrument</span>
    <span>Cts</span>
    <span>Dir</span>
    <span>Gross</span>
    <span>Fees+Com</span>
    <span>Net</span>
  </div>
  <div id="tradeLog"></div>
</div>

<div class="footer">
  <button class="reset-btn" onclick="confirmReset()">↺ Reset Day</button>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>Reset all trades for today?</p>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="resetDay()">Reset</button>
      <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
let trades = [];
let direction = 'LONG';

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});

function setDir(d) {
  direction = d;
  document.getElementById('btnLong').className = 'dir-btn' + (d === 'LONG' ? ' active-long' : '');
  document.getElementById('btnShort').className = 'dir-btn' + (d === 'SHORT' ? ' active-short' : '');
}

function addTrade() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const contracts = parseFloat(document.getElementById('contracts').value) || 1;
  const pnl = parseFloat(document.getElementById('pnl').value);
  const fees = parseFloat(document.getElementById('fees').value) || 0;
  const comm = parseFloat(document.getElementById('comm').value) || 0;
  if (!ticker || isNaN(pnl)) { document.getElementById(ticker ? 'pnl' : 'ticker').focus(); return; }
  trades.unshift({ ticker, contracts, direction, pnl, fees, comm, id: Date.now() });
  ['ticker','contracts','pnl','fees','comm'].forEach(id => document.getElementById(id).value = '');
  render();
}

function fmt(n) { return (n >= 0 ? '+' : '') + n.toFixed(2); }

function render() {
  const wins = trades.filter(t => t.pnl > 0).length;
  const losses = trades.filter(t => t.pnl <= 0).length;
  const grossPL = trades.reduce((s, t) => s + t.pnl, 0);
  const totalFees = trades.reduce((s, t) => s + t.fees, 0);
  const totalComm = trades.reduce((s, t) => s + t.comm, 0);
  const netPL = grossPL - totalFees - totalComm;
  const wr = trades.length ? Math.round((wins / trades.length) * 100) : null;

  document.getElementById('wl').textContent = wins + ' / ' + losses;
  document.getElementById('winrate').textContent = wr !== null ? wr + '%' : '—';
  document.getElementById('totalFees').textContent = totalFees.toFixed(2);
  document.getElementById('totalComm').textContent = totalComm.toFixed(2);

  const gEl = document.getElementById('grossPL');
  gEl.textContent = fmt(grossPL);
  gEl.className = 'stat-value ' + (grossPL > 0 ? 'pos' : grossPL < 0 ? 'neg' : 'neutral');

  const nEl = document.getElementById('netPL');
  nEl.textContent = fmt(netPL);
  nEl.className = 'stat-value ' + (netPL > 0 ? 'pos' : netPL < 0 ? 'neg' : 'neutral');

  const log = document.getElementById('tradeLog');
  if (!trades.length) { log.innerHTML = '<div class="empty-state">No trades yet today</div>'; return; }

  log.innerHTML = trades.map(t => {
    const net = t.pnl - t.fees - t.comm;
    const cls = t.pnl > 0 ? 'win' : 'loss';
    return `<div class="trade-row ${cls}">
      <span class="trade-ticker">${t.ticker}</span>
      <span class="trade-contracts">${t.contracts}</span>
      <span class="trade-dir ${t.direction === 'LONG' ? 'long' : 'short'}">${t.direction === 'LONG' ? 'L' : 'S'}</span>
      <span class="trade-val ${t.pnl >= 0 ? 'pos' : 'neg'}">${fmt(t.pnl)}</span>
      <span class="trade-val muted">${(t.fees + t.comm).toFixed(2)}</span>
      <span class="trade-val ${net >= 0 ? 'pos' : 'neg'}">${fmt(net)}</span>
    </div>`;
  }).join('');
}

function confirmReset() { document.getElementById('confirmOverlay').classList.add('show'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show'); }
function resetDay() { trades = []; closeConfirm(); render(); }

render();
</script>
